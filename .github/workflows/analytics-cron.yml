name: Analytics V2 Cron

on:
  schedule:
    # Runs every hour at minute 5
    - cron: '5 * * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Collect analytics snapshot
        run: |
          # Run the collection script directly
          node scripts/collect-analytics.mjs

      - name: Commit and push snapshot
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add analytics-data-v2/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: add analytics snapshot [skip ci]"
          git push
